# Deploy to GitHub Pages on push to main.
# In repo Settings → Pages, set "Source" to "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Optional: add repo secrets (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, etc.)
      # and pass them here so the built app can talk to your backend.
      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AUTH_USERNAME: ${{ secrets.VITE_AUTH_USERNAME }}
          VITE_AUTH_PASSWORD: ${{ secrets.VITE_AUTH_PASSWORD }}
          VITE_INGEST_WEBHOOK_URL: ${{ secrets.VITE_INGEST_WEBHOOK_URL }}
          VITE_ASK_WEBHOOK_URL: ${{ secrets.VITE_ASK_WEBHOOK_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
